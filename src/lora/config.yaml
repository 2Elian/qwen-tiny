# ── LoRA Fine-tuning Config ──
# Qwen3-0.6B + PEFT LoRA on NL2SQL CoT data

# 模型
model:
  name_or_path: "/data1/nuist_llm/TrainLLM/ModelCkpt/qwen3-06b"
  trust_remote_code: true
  torch_dtype: "bfloat16"
  attn_implementation: "sdpa"           # flash attention

# 数据
data:
  train_file: "/data1/nuist_llm/TrainLLM/attention-residuals-reproduction/data/nl2sql/cot-qa-cold-start.csv"
  max_seq_length: 2048
  val_split: 0.05

# LoRA
lora:
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:   
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: "none"
  task_type: "CAUSAL_LM"

# 训练
training:
  output_dir: "./output/lora-nl2sql"
  num_train_epochs: 3
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8        # effective batch = 16
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0
  bf16: true
  logging_steps: 10
  save_strategy: "epoch"
  eval_strategy: "epoch"
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  report_to: "none"                     # 不用 wandb
  dataloader_num_workers: 4
  seed: 42
